name: validate

# PR gate: schema validation + No-Silent-Drift + contract tests.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true # drift-check diffs against the previous release tag

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Schema validation
        run: node scripts/validate.mjs

      - name: No-Silent-Drift check
        run: node scripts/drift-check.mjs

      - name: Contract tests
        run: node --test
